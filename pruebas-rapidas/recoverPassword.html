<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recuperar Contraseña</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      /* Nuevo gradiente: naranja a rosa */
      background: linear-gradient(135deg, #ff7e5f, #ea99e7);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .recover-container {
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s ease-in-out;
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }
    .form-group input:focus {
      border-color: #da765d;
      outline: none;
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background-color: #da765d;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #feb47b;
    }
    .message {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #d8000c;
    }
    .success {
      color: #28a745;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="recover-container">
    <h2>Recuperar Contraseña</h2>
    <form id="change-password-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />
      </div>
      <div class="form-group">
        <label for="new-password">Nueva Contraseña</label>
        <input type="password" id="new-password" name="new_password" placeholder="********" required />
      </div>
      <div class="form-group">
        <label for="confirm-new-password">Confirmar Contraseña</label>
        <input type="password" id="confirm-new-password" name="confirm_new_password" placeholder="********" required />
      </div>
      <button type="submit" class="btn">Cambiar Contraseña</button>
      <div class="message" id="message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('change-password-form');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.textContent = '';

      const email = document.getElementById('email').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmNewPassword = document.getElementById('confirm-new-password').value;

      try {
        const response = await fetch('http://127.0.0.1:5000/api/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            email,
            new_password: newPassword,
            confirm_new_password: confirmNewPassword 
          })
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.textContent = data.message || 'Contraseña actualizada exitosamente.';
          messageDiv.classList.add('success');
          // Opcional: redirigir a la página de login
        } else {
          messageDiv.textContent = data.error || 'Error al actualizar la contraseña.';
          messageDiv.classList.remove('success');
        }
      } catch (error) {
        messageDiv.textContent = 'Error de conexión con el servidor.';
        console.error(error);
      }
    });
  </script>

</body>
</html>
