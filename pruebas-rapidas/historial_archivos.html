<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla con Paginación</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        select, input {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .pdf {
            background-color: #ff8074;
        }
        .csv {
            background-color: #67d1f1;
        }
        .excel {
            background-color: #69ffb7;
        }
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .pagination {
            display: flex;
            justify-content: flex-end;
        }
        .pagination button {
            margin: 0 2px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
        }
        .pagination button.active {
            background-color: #007bff;
            color: white;
        }

        .descargar-btn {
        background: none;
        border: none;
        font-size: medium;
        cursor: pointer;
        }

        
    </style>
</head>
<body>
    <div class="table-container">
        <div class="controls">
            <div>
                <select id="categoryFilter">
                    <option value="all">All categories</option>
                    <option value="pdf">PDF</option>
                    <option value="csv">CSV</option>
                    <option value="excel">Excel</option>
                </select>
                <input type="text" id="searchBox" placeholder="Buscar...">
            </div>
            <div>
                Mostrar
                <select id="entries">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="15">15</option>
                </select>
                entradas
            </div>
        </div>
        <table id="fileTable">
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th>Tamaño</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <!-- Aquí irán los archivos -->
            </tbody>
        </table>
        <div class="pagination-container">
            <div id="pagination-info"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            let data = [];
            let currentPage = 1;
    
            function fetchFiles() {
                $.get('http://127.0.0.1:5000/api/files', function (response) {
                    data = response.map(file => {
                        return {
                            tipo: file.tipo,
                            descripcion: file.nombre,
                            fecha: formatDate(file.fecha_subida),
                            tamano: file.tamano ? file.tamano + ' MB' : 'Desconocido',
                            url: file.url_descarga
                        };
                    });
                    renderTable();
                }).fail(function () {
                    alert('Error al obtener archivos desde el servidor.');
                });
            }
    
            function formatDate(isoString) {
                if (!isoString) return '';
                const d = new Date(isoString);
                return d.toLocaleDateString('es-ES');
            }
    
            function renderTable() {
                const searchText = $('#searchBox').val().toLowerCase();
                const category = $('#categoryFilter').val();
                const perPage = parseInt($('#entries').val());

                const filteredData = data.filter(d => {
                    const matchText = d.descripcion.toLowerCase().includes(searchText);
                    const matchCat = (category === 'all' || d.tipo === category);
                    return matchText && matchCat;
                });

                const totalPages = Math.ceil(filteredData.length / perPage);
                if (currentPage > totalPages) currentPage = totalPages || 1;

                const start = (currentPage - 1) * perPage;
                const end = start + perPage;

                // 1) Tomar los elementos de la página actual
                let currentItems = filteredData.slice(start, end);

                // 2) Crear una función para extraer el "basename" (nombre sin extensión)
                function getBasename(filename) {
                    // Opción A: usando split:
                    // return filename.split('.').slice(0, -1).join('.');
                    // Opción B: usando regex:
                    return filename.replace(/\.[^/.]+$/, ""); 
                }

                // 3) Ordenar por basename
                currentItems.sort((a, b) => {
                    const baseA = getBasename(a.descripcion).toLowerCase();
                    const baseB = getBasename(b.descripcion).toLowerCase();
                    return baseA.localeCompare(baseB);
                });

                // 4) Generar la tabla, insertando separadores por cambio de basename
                const tbody = $('#fileTable tbody');
                tbody.empty();

                let lastBasename = "";
                currentItems.forEach((d, index) => {
                    // Calcular el basename del archivo actual
                    const currentBasename = getBasename(d.descripcion);

                    // Si NO es el primer archivo y el basename cambió, insertamos separador
                    if (index > 0 && currentBasename !== lastBasename) {
                        tbody.append(`
                            <tr class="separator">
                                <td colspan="5" style="background-color: #fff; height: 8px;"></td>
                            </tr>
                        `);
                    }

                    // Insertar la fila real del archivo
                    tbody.append(`
                        <tr class="${d.tipo}">
                            <td>${d.tipo.toUpperCase()}</td>
                            <td>${d.descripcion}</td>
                            <td>${d.fecha}</td>
                            <td>${d.tamano}</td>
                            <td><button class='descargar-btn'  onclick="forzarDescarga('${d.url}', '${d.descripcion}')">Descargar</button></td>
                        </tr>
                    `);

                    // Actualizar el "lastBasename"
                    lastBasename = currentBasename;
                });

                // 5) Paginación
                const pagContainer = $('#pagination');
                pagContainer.empty();
                for (let i = 1; i <= totalPages; i++) {
                    pagContainer.append(`
                        <button class="page-btn${i === currentPage ? ' active' : ''}" data-page="${i}">${i}</button>
                    `);
                }

                $('.page-btn').click(function () {
                    currentPage = parseInt($(this).attr('data-page'));
                    renderTable();
                });

                $('#pagination-info').text(`Mostrando ${start + 1} a ${Math.min(end, filteredData.length)} de ${filteredData.length} entradas`);
            }
    
            $('#searchBox, #categoryFilter, #entries').on('input change', function () {
                currentPage = 1;
                renderTable();
            });
    
            fetchFiles();
        });


        function forzarDescarga(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename; // Esto sugiere al navegador que lo descargue
            document.body.appendChild(link);
            link.click();
            link.remove();
        }
    </script>
    
</body>
</html>
