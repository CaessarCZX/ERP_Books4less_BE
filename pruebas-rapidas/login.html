<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Moderno</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.6s ease-in-out;
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }
    .form-group input:focus {
      border-color: #667eea;
      outline: none;
    }
    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background-color: #667eea;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .btn-login:hover {
      background-color: #5a67d8;
    }
    .message {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #d8000c;
    }
    .success {
      color: #28a745;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />
      </div>
      <!-- Si bien el endpoint actual solo usa el email, dejamos el campo de contraseña por si se necesita en el futuro -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="********" required />
      </div>
      <button type="submit" class="btn-login">Entrar</button>
      <div class="message" id="message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      // En este ejemplo, aunque el endpoint recibe solo el email, también capturamos la contraseña
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://127.0.0.1:5000/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email, password: password })
        });

        const data = await response.json();

        if (response.ok) {
          // Se asume que se reciben login_token y session_token
          // Puedes almacenarlos en localStorage o cookies para usarlos posteriormente
          localStorage.setItem('login_token', data.login_token);
          localStorage.setItem('session_token', data.session_token);
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('email', data.email);

          messageDiv.textContent = data.message;
          messageDiv.classList.add('success');
          messageDiv.classList.remove('error');

          // Redirecciona a otra página, por ejemplo dashboard.html
          setTimeout(() => {
            window.location.href = 'historial_archivos.html';
          }, 1000); // Redirige después de 1 segundo

        } else {
          messageDiv.textContent = data.error || 'Error al iniciar sesión.';
          messageDiv.classList.remove('success');
        }

      } catch (error) {
        console.error(error);
        messageDiv.textContent = 'Error de conexión con el servidor.';
        messageDiv.classList.remove('success');
      }
    });
  </script>

</body>
</html>
